        body { margin: 0; font-family: 'Arial', sans-serif; background-color: #FFF9E7; color: #333; }

            background-color: #FF4500; 
            padding: 15px; 
            text-align: center;

            margin: 0 10px; 
            font-weight: bold; 
            text-transform: uppercase;
            font-size: 0.9rem;
        }
        nav a:hover { text-decoration: underline; }

        /* Hero Section */

            background-color: #FF4500; 
            color: white; 
            padding: 80px 20px; 
            text-align: center; 
        }
        h1 { font-size: 4rem; margin: 0; text-transform: uppercase; }
        
        .container { max-width: 1000px; margin: auto; padding: 40px 20px; text-align: center; }
        .btn { 
            background-color: #FF4500; 
            color: white; 
            padding: 15px 30px; 
            text-decoration: none; 
            border-radius: 5px; 
            display: inline-block;
            margin-top: 20px;
            font-weight: bold;
        }
